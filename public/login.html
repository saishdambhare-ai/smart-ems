<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — EMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0d1b2a; --blue:#1a6ef5; --cyan:#00c2cb;
      --white:#f8faff; --grey:#8a9bb5; --card:#131e2e;
      --border:rgba(255,255,255,0.07);
    }
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--navy);
      color:var(--white); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:40px 20px;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image:
        linear-gradient(rgba(26,110,245,.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(26,110,245,.05) 1px,transparent 1px);
      background-size:60px 60px; pointer-events:none;
    }
    .container { position:relative; z-index:1; width:100%; max-width:420px; }
    .back-link {
      display:inline-flex; align-items:center; gap:8px; color:var(--grey);
      text-decoration:none; font-size:.9rem; margin-bottom:24px; transition:color .2s;
    }
    .back-link:hover { color:var(--white); }
    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:40px;
      animation:fadeIn .5s ease;
    }
    .logo {
      font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem;
      background:linear-gradient(135deg,var(--blue),var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:6px;
    }
    h2 { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; margin-bottom:4px; }
    .sub { color:var(--grey); font-size:.9rem; margin-bottom:32px; }

    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:.78rem; color:var(--grey); text-transform:uppercase; letter-spacing:.8px; margin-bottom:7px; }
    .form-group input, .form-group select {
      width:100%; background:rgba(255,255,255,.05); border:1px solid var(--border);
      color:var(--white); padding:12px 14px; border-radius:9px; font-size:.95rem;
      font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; appearance:none;
    }
    .form-group input::placeholder { color:rgba(138,155,181,.5); }
    .form-group input:focus, .form-group select:focus { border-color:rgba(26,110,245,.5); }
    .form-group select option { background:#1a2d42; }

    /* Role toggle */
    .role-toggle { display:flex; gap:4px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:10px; padding:5px; margin-bottom:24px; }
    .role-btn {
      flex:1; padding:9px; border-radius:7px; border:none; background:transparent;
      color:var(--grey); font-family:'DM Sans',sans-serif; font-size:.9rem; cursor:pointer; transition:all .2s;
    }
    .role-btn.active { background:rgba(26,110,245,.2); color:#7ab4ff; }

    .submit-btn {
      width:100%; background:linear-gradient(135deg,var(--blue),#1458d0);
      color:#fff; border:none; padding:14px; border-radius:10px;
      font-size:1rem; font-family:'DM Sans',sans-serif;
      cursor:pointer; font-weight:500; transition:opacity .2s;
      box-shadow:0 8px 24px rgba(26,110,245,.35);
    }
    .submit-btn:hover { opacity:.88; }

    .register-link { text-align:center; margin-top:20px; color:var(--grey); font-size:.88rem; }
    .register-link a { color:#7ab4ff; text-decoration:none; }
    .register-link a:hover { text-decoration:underline; }

    /* Toast */
    .toast {
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      padding:12px 22px; border-radius:10px; font-size:.9rem; font-weight:500;
      opacity:0; pointer-events:none; transition:opacity .3s; z-index:999;
      box-shadow:0 8px 24px rgba(0,0,0,.3);
    }
    .toast.show { opacity:1; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Back to home</a>
  <div class="card">
    <div class="logo">EMS</div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account</p>

    <div class="role-toggle">
      <button class="role-btn active" id="btn-admin" onclick="setRole('admin')">🔑 Admin</button>
      <button class="role-btn" id="btn-employee" onclick="setRole('employee')">👤 Employee</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <input type="hidden" id="role" value="admin">
      <button type="submit" class="submit-btn">Sign In →</button>
    </form>
    <div class="register-link">Don't have an account? <a href="register.html">Register</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentRole = 'admin';

  function setRole(role) {
    currentRole = role;
    document.getElementById('role').value = role;
    document.getElementById('btn-admin').classList.toggle('active', role==='admin');
    document.getElementById('btn-employee').classList.toggle('active', role==='employee');
  }

  function showToast(msg, color='#ef4444') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.background = color; t.style.color = '#fff';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const role     = document.getElementById('role').value;

    try {
      const res  = await fetch('/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password, role })
      });
      const text = await res.text();
      if (res.ok) {
        showToast('Login successful!', '#22c55e');
        setTimeout(() => { window.location.href = role==='admin' ? '/admin.html' : '/employee_dashboard.html'; }, 900);
      } else {
        showToast(text || 'Invalid credentials');
      }
    } catch(err) {
      showToast('Server error');
    }
  });
</script>
</body>
</html>
