<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Employee — EMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0d1b2a; --blue:#1a6ef5; --cyan:#00c2cb;
      --white:#f8faff; --grey:#8a9bb5; --card:#131e2e; --border:rgba(255,255,255,0.07);
    }
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    body::before { content:''; position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(26,110,245,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(26,110,245,.05) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }
    .container { position:relative; z-index:1; width:100%; max-width:560px; }
    .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--grey); text-decoration:none; font-size:.9rem; margin-bottom:20px; transition:color .2s; }
    .back-link:hover { color:var(--white); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px; animation:fadeIn .5s ease; }
    .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; background:linear-gradient(135deg,var(--blue),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
    h2 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; margin-bottom:24px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:.78rem; color:var(--grey); text-transform:uppercase; letter-spacing:.8px; margin-bottom:7px; }
    .form-group input, .form-group select {
      width:100%; background:rgba(255,255,255,.05); border:1px solid var(--border);
      color:var(--white); padding:11px 14px; border-radius:9px; font-size:.95rem;
      font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; appearance:none;
    }
    .form-group input:focus, .form-group select:focus { border-color:rgba(26,110,245,.5); }
    .form-group select option { background:#1a2d42; }
    .submit-btn {
      width:100%; background:linear-gradient(135deg,var(--blue),#1458d0); color:#fff; border:none;
      padding:13px; border-radius:10px; font-size:1rem; font-family:'DM Sans',sans-serif;
      cursor:pointer; transition:opacity .2s; margin-top:6px;
    }
    .submit-btn:hover { opacity:.88; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="container">
  <a href="manage.html" class="back-link">← Back to Manage</a>
  <div class="card">
    <div class="logo">EMS</div>
    <h2>Update Employee</h2>
    <form id="updateForm">
      <input type="hidden" id="id" name="id">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="first_name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="last_name" required>
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="phone" required>
        </div>
        <div class="form-group">
          <label>Experience (yrs)</label>
          <input type="number" id="experience" min="0" max="40" step="0.5" value="0">
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <select id="department" required>
            <option value="">Select</option>
            <option value="IT">IT</option>
            <option value="Computer">Computer</option>
            <option value="ENTC">ENTC</option>
            <option value="AIML">AIML</option>
          </select>
        </div>
        <div class="form-group">
          <label>Profession</label>
          <select id="profession" required>
            <option value="">Select</option>
            <option value="Professor">Professor</option>
            <option value="Lab Technician">Lab Technician</option>
            <option value="Administrative Staff">Administrative Staff</option>
            <option value="Librarian">Librarian</option>
          </select>
        </div>
      </div>
      <button type="submit" class="submit-btn">Save Changes →</button>
    </form>
  </div>
</div>
<script>
  const id = new URLSearchParams(window.location.search).get('id');

  fetch(`/get_employee/${id}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) { alert(data.error); window.location.href='manage.html'; return; }
      document.getElementById('id').value          = data._id || data.id;
      document.getElementById('first_name').value  = data.first_name;
      document.getElementById('last_name').value   = data.last_name;
      document.getElementById('username').value    = data.username;
      document.getElementById('email').value       = data.email;
      document.getElementById('phone').value       = data.phone;
      document.getElementById('address').value     = data.address;
      document.getElementById('department').value  = data.department;
      document.getElementById('profession').value  = data.profession;
      document.getElementById('experience').value  = data.experience || 0;
    });

  document.getElementById('updateForm').addEventListener('submit', async e => {
    e.preventDefault();
    const body = {
      id:         document.getElementById('id').value,
      first_name: document.getElementById('first_name').value,
      last_name:  document.getElementById('last_name').value,
      username:   document.getElementById('username').value,
      email:      document.getElementById('email').value,
      phone:      document.getElementById('phone').value,
      address:    document.getElementById('address').value,
      department: document.getElementById('department').value,
      profession: document.getElementById('profession').value,
      experience: document.getElementById('experience').value,
    };
    try {
      const res  = await fetch('/update_employee', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (data.success) { alert('Updated successfully!'); window.location.href='manage.html'; }
      else alert('Error: ' + data.message);
    } catch(e) { alert('Server error'); }
  });
</script>
</body>
</html>
